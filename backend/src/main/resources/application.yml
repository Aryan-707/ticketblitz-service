server:
  port: ${PORT:8080}

spring:
  application:
    name: TicketBlitz
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketing_db_s59y}
    username: ${DB_USERNAME:ticketing_db_s59y_user}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: ${HIKARI_CONN_TIMEOUT:5000}
      idle-timeout: 600000 
      max-lifetime: 1800000
      leak-detection-threshold: 5000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      connect-timeout: 5000
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  autoconfigure:
    exclude:
      - ${KAFKA_AUTOCONFIGURE_EXCLUDE:}

kafka:
  enabled: ${KAFKA_ENABLED:false}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{bookingId}] %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  endpoint:
    prometheus:
      enabled: true

resilience4j.circuitbreaker:
  instances:
    redisLock:
      slidingWindowSize: 10
      failureRateThreshold: 30
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 3
