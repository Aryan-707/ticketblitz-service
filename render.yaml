services:
  - type: web
    name: ticketblitz-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      - key: KAFKA_ENABLED
        value: "false"
      - key: SPRING_AUTOCONFIGURE_EXCLUDE
        value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration"
      - key: HIKARI_MAX_POOL
        value: "3"
      - key: HIKARI_MIN_IDLE
        value: "1"
      - key: HIKARI_CONN_TIMEOUT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
