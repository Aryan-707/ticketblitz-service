services:
  - type: web
    name: ticketblitz-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: ticketblitz-db
          property: connectionString
      - key: DB_PASSWORD
        fromDatabase:
          name: ticketblitz-db
          property: password
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: KAFKA_ENABLED
        value: "false"
      - key: SPRING_AUTOCONFIGURE_EXCLUDE
        value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: ticketblitz-db
    databaseName: ticketing_db
    plan: free
